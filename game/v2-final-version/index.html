<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game On Project</title>

        <!--normalize css-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!--google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&family=Inconsolata&display=swap" rel="stylesheet">

    <!--styling sheet-->
    <link rel="stylesheet" href="styles.css">

    <!--javascript-->
    <script src="script.js" defer></script>
</head>
<body>
    <section id="startscreen">
        <h1>Forest Brawl</h1>

        <p>Who is the Best Trash Animal?</p>

        <div id="default-images">

            <img src="images/racoon_sitting.png" alt="default racoon" class="racoon-position">

            <img src="images/possum_standing.png" alt="default possum" class="possum-position">

        </div>

        <button id="start-btn">Start Game</button>
    </section>

    <section id="gamescreen" style="display: none;">

        <h2>Let the Brawl Begin!</h2>

        <div class="text-box">

            <div id="messages">
                <p>Let's flip a coin to see who's going first!</p>
            </div>

            <div id="coin" class="coin"></div>
            
             <button id="flip-coin-btn">Flip Coin</button>

        </div>

        <div id="racoon-in-the-ring">

            <img src="images/racoon_in_the_ring.png" alt="boxer-racoon" class="racoon-position">

            <div class="health-bar">

                <div id="racoon-health-bar">
                    <div></div>
                </div>

                <p id="racoon-health">100%</p>

            </div>

        </div>

        <div id="possum-in-the-ring">

            <img src="images/possum_in_the_ring.png" alt="possum-boxer" class="possum-position">

            <div class="health-bar">

                <div id="possum-health-bar">
                    <div></div>
                </div>

                <p id="possum-health">100%</p>

            </div>

        </div>

        

    </section>

</body>
</html>
